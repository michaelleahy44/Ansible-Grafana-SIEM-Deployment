- name: Install Grafana dependencies
  ansible.builtin.apt:
    name:
      - adduser
      - libfontconfig1
      - musl
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Download Grafana
  ansible.builtin.get_url:
    url: https://dl.grafana.com/oss/release/grafana_13.0.0_amd64.deb
    dest: /tmp/grafana_13.0.0_amd64.deb

- name: Install Grafana
  ansible.builtin.apt:
    deb: /tmp/grafana_13.0.0_amd64.deb
  when: ansible_facts['os_family'] == 'Debian'

- name: Start and enable Grafana
  ansible.builtin.systemd:
    name: grafana-server
    enabled: true
    state: started
    daemon_reload: true